---
version: "2"
linters:
  default: all
  disable:
    - depguard
    - gomodguard
    - wsl
    - tagliatelle
    - nolintlint
    - varnamelen
    - ireturn
    - revive
    - wrapcheck
    - noinlineerr
    - gosec
    - goconst
  settings:
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
